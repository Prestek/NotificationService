name: Deploy Release

on:
  push:
    branches:
      - dev 

jobs:
  deploy:
    uses: Prestek/central-pipelines/.github/workflows/deploy.yml@V0.0.2
    with:
      PROJECT_NAME: "NotificationService"       # Nombre de la carpeta/proyecto en la instancia EC2
      IMAGE_NAME: "notification-service"                  # Nombre de la imagen Docker
      CONTAINER_NAME: "notification-service"              # Nombre del contenedor Docker
      PORT: "8083"                        # Puerto en el que se expondrá el contenedor
      REPO_URL: "https://github.com/Prestek/NotificationService.git"  # URL del repositorio a desplegar
      BRANCH: "dev"                      
    secrets:
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      AWS_SECRET_ARN: ${{ secrets.AWS_SECRET_ARN }}